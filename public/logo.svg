<svg
  width="100%"
  height="100%"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="left-clip">
      <rect x="0" y="0" width="256" height="512" />
    </clipPath>
    <clipPath id="right-clip">
      <rect x="256" y="0" width="256" height="512" />
    </clipPath>
    
    <g id="gear-shape">
      <!-- Cross -->
      <rect x="216" y="50" width="80" height="412" rx="16" />
      <rect x="50" y="216" width="412" height="80" rx="16" />
      <!-- Diagonal -->
      <rect x="216" y="50" width="80" height="412" rx="16" transform="rotate(45 256 256)" />
      <rect x="216" y="50" width="80" height="412" rx="16" transform="rotate(-45 256 256)" />
      <!-- Core circle -->
      <circle cx="256" cy="256" r="160" />
    </g>

    <g id="notebook-outline">
      <!-- Outer rounded rect -->
      <rect x="156" y="140" width="180" height="232" rx="28" fill="none" stroke-width="24" />
      <!-- Top binder hoops -->
      <rect x="132" y="180" width="48" height="16" rx="8" />
      <rect x="132" y="248" width="48" height="16" rx="8" />
      <rect x="132" y="316" width="48" height="16" rx="8" />
      <!-- Lines -->
      <rect x="180" y="180" width="100" height="16" rx="8" />
      <rect x="180" y="235" width="80" height="16" rx="8" />
      <rect x="180" y="290" width="120" height="16" rx="8" />
    </g>
  </defs>

  <!-- Left Side #185669 Dark Teal -->
  <use href="#gear-shape" fill="#185669" clipPath="url(#left-clip)" />
  <!-- Right Side #217b96 Light Teal -->
  <use href="#gear-shape" fill="#217b96" clipPath="url(#right-clip)" />

  <!-- The white background of the notebook -->
  <rect x="156" y="140" width="180" height="232" rx="28" fill="white" />
  
  <!-- The outline/details of notebook -->
  <use href="#notebook-outline" fill="#185669" stroke="#185669" clipPath="url(#left-clip)" />
  <use href="#notebook-outline" fill="#217b96" stroke="#217b96" clipPath="url(#right-clip)" />

  <!-- Green Checkmark Overlapping -->
  <path d="M245 270 L275 300 L345 210" stroke="#71b54a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
